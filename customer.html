<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Catalog</title>
    <link rel="stylesheet" href="tailor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        .order-btn-full { background: #25D366; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .heart-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.9); border: none; width: 35px; height: 35px; border-radius: 50%; color: var(--danger); font-size: 18px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; }
    </style>
</head>
<body>
    <header class="top-header">
        <h2 id="brand-title">Loading Catalog...</h2>
        <i class="fas fa-moon" style="font-size: 20px; cursor: pointer;" onclick="toggleCustomerTheme()"></i>
    </header>

    <div class="search-container" style="margin-top: 15px;">
        <input type="text" id="cust-search" class="search-box" placeholder="Search styles...">
    </div>

    <main class="catalog-list" id="customer-list"></main>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-close" onclick="closeLightbox()">&times;</div>
        <img id="lightbox-img" src="">
        <div id="lightbox-video-container" style="width:100%; max-width:600px; display:none;"></div>
    </div>

    <script src="customer.js"></script>
</body>
</html>
