<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hub - Admin</title>
    <link rel="stylesheet" href="tailor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="auth-screen" style="display:none; position:fixed; inset:0; background:#f0f2f5; z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <div class="stat-box" style="width:100%; max-width:350px; padding:30px; background:white; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
            <h2 id="auth-title">Tailor Login</h2>
            <input type="text" id="brand-input" placeholder="Business Name" style="display:none; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ddd; width:100%;">
            <input type="tel" id="phone-input" placeholder="WhatsApp (e.g. 23480...)" style="display:none; margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ddd; width:100%;">
            <input type="email" id="email-input" placeholder="Email" style="margin-bottom:10px; padding:12px; border-radius:8px; border:1px solid #ddd; width:100%;">
            <input type="password" id="pass-input" placeholder="Password" style="margin-bottom:15px; padding:12px; border-radius:8px; border:1px solid #ddd; width:100%;">
            <button onclick="handleAuth()" style="width:100%; padding:14px; background:#111; color:#fff; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Continue</button>
            <p style="margin-top:15px; font-size:0.85rem; text-align:center;"><span onclick="toggleAuthMode()" id="toggle-link" style="color:#111; font-weight:bold; cursor:pointer;">Switch to Sign Up</span></p>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header"><h3>Admin Menu</h3><i class="fas fa-times" onclick="closeModals()"></i></div>
        <ul class="menu-links">
            <li onclick="toggleDarkMode()"><i class="fas fa-moon"></i> <span id="mode-text">Dark Mode</span></li>
            <li onclick="changeBrandName()"><i class="fas fa-edit"></i> <span>Change Brand</span></li>
            <li onclick="copyCatalogLink()"><i class="fas fa-link"></i> <span>Copy Catalog Link</span></li>
            <li onclick="showQRModal()"><i class="fas fa-qrcode"></i> <span>My Shop QR</span></li>
            <li onclick="reportError()"><i class="fas fa-bug"></i> <span>Report Error</span></li>
            <li onclick="auth.signOut()" style="color: #ff4d4d; border-top: 1px solid #eee; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></li>
        </ul>
    </div>

    <div id="qr-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:5000; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#fff; padding:25px; border-radius:20px; text-align:center; max-width:300px;">
            <h3>Shop QR Code</h3>
            <div id="qr-container" style="margin:20px 0;"></div>
            <button onclick="downloadQR()" style="background:#111; color:#fff; padding:12px 20px; border-radius:10px; border:none; cursor:pointer; width:100%;">Download QR</button>
            <p onclick="closeQRModal()" style="margin-top:15px; cursor:pointer; color:#666;">Close</p>
        </div>
    </div>

    <header id="intro"><i class="fas fa-bars" id="open-sidebar"></i><h3 id="brand-name">My Hub</h3> <button id="add-button"><b>+ Add</b></button></header>
    <main>
        <section id="items-info">
            <div class="stat-box"><small>Total Designs</small><b id="total-stocks">0</b></div>
            <div class="stat-box"><small>Low Stock</small><b id="low-stocks" style="color: #ff4d4d;">0</b></div>
        </section>
        <div id="search-container"><input type="search" id="main-search" oninput="searchDesigns()" placeholder="🔍 Search styles..."></div>
        <section id="stocks-list"></section>
    </main>

    <div id="dropdown"><div class="dropdown-content">
        <h3>Add New Style</h3>
        <label>Photo:</label> <input id="file" type="file" accept="image/*"/><br>
        <label>Name:</label> <input id="letter" type="text" placeholder="e.g. Senator"/><br>
        <label>Price (₦):</label> <input id="price" type="number" placeholder="20000"/>
        <div id="measurement">
            <div><label>Chest:</label> <input id="chest" type="number" placeholder="in"></div>
            <div><label>Neck:</label> <input id="neck" type="number" placeholder="in"></div>
            <div><label>Head:</label> <input id="head" type="number" placeholder="in"></div>
        </div>
        <div id="buttons"><button onclick="closeModals()">Cancel ❌</button><button id="btn1">Upload 🚀</button></div>
    </div></div>
    <div id="image-modal" onclick="this.style.display='none'"><img src="" id="full-glory-img"></div>
    <div id="overlay"></div>
    <script src='tailor.js'></script>
</body>
</html>
